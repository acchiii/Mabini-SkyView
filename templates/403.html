{% extends 'base.html' %}

{% block title %}Page Not Found — Mabini SkyView{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center bg-slate-950 px-4">
  <div class="text-center max-w-lg">
    <!-- Big 404 -->
    <div class="relative mb-8">
      <p class="font-display font-bold text-[10rem] leading-none text-slate-800 select-none">404</p>
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-24 h-24 rounded-full bg-teal-500/15 flex items-center justify-center">
          <i data-lucide="mountain" class="w-12 h-12 text-teal-400"></i>
        </div>
      </div>
    </div>

    <h1 class="font-display text-3xl font-bold text-white mb-4">403</h1>
    <p class="text-slate-400 text-base leading-relaxed mb-8">
      {{ error }}
      <br>
      {% comment %} {{ error }} {% endcomment %}
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="{% url 'home' %}" class="inline-flex items-center gap-2 px-7 py-3.5 rounded-full bg-teal-500 hover:bg-teal-400 text-white font-semibold text-sm transition-all duration-300 hover:-translate-y-0.5">
        <i data-lucide="home" class="w-4 h-4"></i>
        Back to Homepage
      </a>
      <a href="{% url 'contact' %}" class="inline-flex items-center gap-2 px-7 py-3.5 rounded-full bg-slate-800 hover:bg-slate-700 text-white font-semibold text-sm border border-slate-700 transition-all duration-300">
        <i data-lucide="mail" class="w-4 h-4"></i>
        Contact Us
      </a>
    </div>
  </div>
</section>
{% endblock %}
