services:
  - type: web
    name: mabini-skyview
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py makemigrations && python manage.py migrate --run-syncdb && python manage.py runscript seed_data && python manage.py collectstatic --no-input
    startCommand: gunicorn mabini_skyview.wsgi:application
    autoDeploy: true